<div class="login-container">
  <div class="login-card">
    
    <div class="login-header">
      <img src="/logo-ammpla.jpg" alt="Logo AMMPLA" class="logo-ammpla">
      
      <h2>Sistema de Escala</h2>
      <p>Autarquia Municipal de Mobilidade de Petrolina</p>
    </div>

    <form (ngSubmit)="fazerLogin()" class="login-form">
      
      @if (mensagemErro) {
        <div class="alert-error">
          {{ mensagemErro }}
        </div>
      }

      <div class="form-group">
        <label for="usuario">Matrícula / Usuário</label>
        <input 
          type="text" 
          id="usuario" 
          name="usuario" 
          [(ngModel)]="credenciais.login" 
          placeholder="Digite sua matrícula"
          autocomplete="off"
          required>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input 
          type="password" 
          id="senha" 
          name="senha" 
          [(ngModel)]="credenciais.senha" 
          placeholder="Digite sua senha"
          autocomplete="current-password" 
          required>
      </div>

      <button type="submit" class="btn-login" [disabled]="carregando">
        {{ carregando ? 'Autenticando...' : 'Entrar' }}
      </button>

    </form>
  </div>
</div>
