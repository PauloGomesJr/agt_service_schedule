<header class="top-bar">
  <div class="logo-area">
    <img src="/logo-ammpla.jpg" alt="Logo AMMPLA" class="mini-logo">
    <span class="system-title">Escala Web - AMMPLA</span>
  </div>

  <nav class="main-nav">
    <a routerLink="/escala" routerLinkActive="active-link" class="nav-link">Escalas</a>
    @if (isAdmin) {
      <a routerLink="/servidores" routerLinkActive="active-link" class="nav-link">Servidores</a>
      <a routerLink="/determinacoes" routerLinkActive="active-link" class="nav-link">Determinações de Serviço</a>
      <a routerLink="/config" routerLinkActive="active-link" class="nav-link">Configurações</a>
      <a routerLink="/painel-usuarios" routerLinkActive="active-link" class="nav-link">Aprovações</a>
    }
  </nav>

  <div class="user-area">
    <span class="user-greeting">👤 Olá, <strong>{{ usuario | titlecase }}</strong></span>
    <button (click)="sair()" class="btn-logout">Sair 🚪</button>
  </div>
</header>
